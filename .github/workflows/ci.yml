# Continuous integration: restore → build (strict) → test → pack → upload artifacts.
# Publishing to NuGet.org is handled by release.yml.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Odex.AspNetCore.Clarc.Application.sln

      - name: Build (Release, warnings as errors)
        run: >
          dotnet build Odex.AspNetCore.Clarc.Application.sln
          -c Release
          --no-restore
          -p:ContinuousIntegrationBuild=true
          -p:TreatWarningsAsErrors=true

      - name: Test
        run: >
          dotnet test Odex.AspNetCore.Clarc.Application.sln
          -c Release
          --no-build
          --verbosity normal

      - name: Pack (verify NuGet layout)
        run: >
          dotnet pack Odex.AspNetCore.Clarc.Application/Odex.AspNetCore.Clarc.Application.csproj
          -c Release
          --no-build
          -o artifacts

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error
