version: 2
updates:
  - package-ecosystem: nuget
    directory: "/Odex.AspNetCore.Clarc.Application"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: nuget
    directory: "/Odex.AspNetCore.Clarc.Application.Tests"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
